<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ラベル印刷">
  <meta name="theme-color" content="#0a0a0f">
  <title>QR Label Printer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg:        #15171c;
      --surface:   #1b1e25;
      --surface2:  #20242c;
      --border:    #2c3038;
      --accent:    #ffb020;
      --accent2:   #cc8814;
      --ok:        #2fe3ad;
      --ng:        #ff5c72;
      --paper:     #f3efe4;
      --ink:       #1a1a1a;
      --text:      #eceef2;
      --muted:     #71778a;
      --card-r:    16px;
      --chamfer-lg: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
      --chamfer-md: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      --chamfer-sm: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-icon {
      width: 34px; height: 34px;
      background: var(--surface2);
      border: 1.5px solid var(--accent2);
      clip-path: var(--chamfer-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      flex: 1;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
      animation: dot-pulse 1.6s ease-in-out infinite;
    }
    .status-dot.ready {
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok);
      animation: none;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ─── Main ─── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ─── モード切替 ─── */
    .mode-toggle {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      clip-path: var(--chamfer-md);
      padding: 11px 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn-sub {
      font-size: 10px;
      font-weight: 500;
      font-family: 'Consolas', 'Courier New', monospace;
      color: var(--muted);
      opacity: 0.85;
    }
    .mode-btn.active {
      border-color: var(--accent);
      background: rgba(255,176,32,0.1);
      color: var(--accent);
    }
    .mode-btn.active .mode-btn-sub { color: var(--accent); opacity: 0.8; }
    .mode-btn:active { transform: scale(0.97); }

    /* ─── フィールド番号セレクタ ─── */
    .field-selector {
      background: var(--surface);
      border: 1px solid var(--border);
      clip-path: var(--chamfer-md);
      padding: 12px 14px;
      flex-shrink: 0;
    }
    .field-selector-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }
    .field-num-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .field-num-btn {
      min-width: 48px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      clip-path: var(--chamfer-sm);
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .field-num-btn.active {
      border-color: var(--accent);
      background: rgba(255,176,32,0.14);
      color: var(--accent);
    }
    .field-num-btn:active { transform: scale(0.95); }

    .scan-btn {
      width: 100%;
      position: relative;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #2a1900;
      border: none;
      clip-path: var(--chamfer-lg);
      padding: 19px;
      font-size: 17px;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 0.03em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 22px rgba(255,176,32,0.3);
      -webkit-tap-highlight-color: transparent;
    }
    .scan-btn:active { transform: scale(0.97); }
    .scan-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    /* ビューファインダー風の角ブラケット（左上・右下） */
    .scan-btn::before,
    .scan-btn::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border: 2px solid rgba(42,25,0,0.5);
      pointer-events: none;
    }
    .scan-btn::before {
      top: 6px; left: 6px;
      border-right: none; border-bottom: none;
    }
    .scan-btn::after {
      bottom: 6px; right: 6px;
      border-left: none; border-top: none;
    }

    .raw-data-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent2);
      clip-path: var(--chamfer-sm);
      padding: 12px 14px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Consolas', 'Courier New', monospace;
      word-break: break-all;
      line-height: 1.5;
      display: none;
    }
    .raw-data-box.show { display: block; }
    .raw-data-box .raw-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
      display: block;
    }
    .raw-data-box .raw-label::before {
      content: '▸ ';
    }

    /* ─── Label preview area (this is what gets printed) ─── */
    .label-card {
      background: #ffffff;
      color: #000000;
      border-radius: 10px;
      padding: 14px 16px;
      display: none;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      border: 1px solid #d0d0d8;
    }
    .label-card.show { display: flex; }

    /* 画面プレビューだけを「ミシン目つきの台紙ラベル」風に。
       印刷専用(#labelCardPrint)はここでは一切上書きしない＝印刷結果に影響なし。 */
    #labelCardPreview {
      background: var(--paper);
      border: none;
      border-radius: 3px;
      padding: 26px 16px 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.5), 0 1px 0 rgba(0,0,0,0.2);
      transform: rotate(-0.5deg);
      margin: 2px 8px 12px;
      position: relative;
    }
    #labelCardPreview::before {
      content: '';
      position: absolute;
      top: 14px; left: 16px; right: 16px;
      border-top: 2px dashed rgba(0,0,0,0.2);
    }
    #labelCardPreview::after {
      content: '';
      position: absolute;
      top: 6px; left: 22px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--bg);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }

    /* 印刷専用ラベルは画面上では常に非表示にする */
    #printPage {
      display: none;
    }
    #labelCardPrint {
      display: none;
    }

    .label-card .label-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .label-card .emphasis-block {
      flex: 1;
      min-width: 0;
    }
    .label-card .field-1 {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 0.01em;
      line-height: 1.15;
      word-break: break-all;
      color: #000;
    }
    .label-card .field-2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.2;
      word-break: break-all;
      color: #000;
      margin-top: 2px;
    }
    .label-card .qr-block {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .label-card .qr-block img,
    .label-card .qr-block canvas {
      display: block;
      width: 92px;
      height: 92px;
    }

    /* ─── 操作ボタン（上部配置） ─── */
    .action-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .footer-btn {
      flex: 1;
      clip-path: var(--chamfer-md);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
      border: 1.5px solid var(--border);
    }
    .footer-btn:active { transform: scale(0.97); }
    .footer-btn.reset {
      background: var(--surface2);
      color: var(--text);
    }
    .footer-btn.print {
      background: var(--ok);
      color: #04261c;
      border-color: var(--ok);
      opacity: 0.4;
      pointer-events: none;
    }
    .footer-btn.print.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    .status-bar {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 4px;
    }

    /* ─── Camera scan modal ─── */
    .cam-modal {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    .cam-modal.open { display: flex; }
    .cam-video-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }
    .cam-video-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cam-frame {
      position: absolute;
      top: 50%; left: 50%;
      width: 72%; max-width: 320px;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 3px solid var(--accent);
      border-radius: 18px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
    }
    .cam-frame::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: cam-scan 1.8s ease-in-out infinite;
    }
    @keyframes cam-scan {
      0%, 100% { top: 6%; }
      50%      { top: 92%; }
    }
    .cam-topbar {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 14px 16px;
      z-index: 1;
    }
    .cam-close {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cam-status {
      position: absolute;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 0 24px;
    }
    .cam-error {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px;
      text-align: center;
    }
    .cam-error p { color: var(--muted); font-size: 14px; line-height: 1.6; }
    .cam-error-icon { font-size: 40px; }
    .cam-retry-btn {
      background: var(--accent);
      color: #2a1900;
      border: none;
      padding: 10px 22px;
      clip-path: var(--chamfer-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ─── Print styles: 印刷時は#labelCardPrintだけを表示する ─── */
    @media print {
      @page {
        size: 55mm 65mm; /* 幅55mm × 長さ65mm（プチラパン設定値どおりの縦印刷） */
        margin: 0;
      }
      html, body {
        background: #fff !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      /* 画面用のUIを丸ごと非表示にする */
      .app {
        display: none !important;
      }
      #printPage {
        display: block !important;
        position: relative;
        width: 55mm;
        height: 65mm;
        overflow: hidden;
      }
      /* 縦印刷：文字（強調1→強調2）を上に、QRを下に配置 */
      #labelCardPrint {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: flex-start !important;
        box-shadow: none !important;
        border: none !important;
        border-radius: 0 !important;
        box-sizing: border-box !important;
        width: 55mm;
        height: 65mm;
        padding: 3mm;
        margin: 0;
        overflow: hidden;
        gap: 2mm;
      }
      #labelCardPrint .label-row {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        width: 100%;
        gap: 2mm;
      }
      #labelCardPrint .emphasis-block {
        width: 100%;
        text-align: center;
      }
      /* 大きさは現状のまま維持 */
      #labelCardPrint .field-1 {
        font-size: 10mm !important;
        line-height: 1.1 !important;
        word-break: break-all;
      }
      /* 「:」で区切って改行表示 */
      #labelCardPrint .field-2 {
        font-size: 4mm !important;
        line-height: 1.2 !important;
        word-break: normal !important;
        overflow-wrap: normal !important;
        margin-top: 1mm !important;
      }
      /* QRは現状の1.5倍サイズ */
      #labelCardPrint .qr-block {
        flex-shrink: 0;
      }
      #labelCardPrint .qr-block img,
      #labelCardPrint .qr-block canvas {
        width: 30mm !important;
        height: 30mm !important;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-icon">🏷️</div>
    <h1>ラベル印刷</h1>
    <div class="status-dot" id="statusDot"></div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- モード切替 -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeBtnDefault" onclick="setMode('default')" type="button">
        標準モード
        <span class="mode-btn-sub">1・2番目を強調＋全データQR</span>
      </button>
      <button class="mode-btn" id="modeBtnField" onclick="setMode('field')" type="button">
        指定フィールド印字
        <span class="mode-btn-sub">選んだ項目の文字＋その項目QR</span>
      </button>
    </div>

    <!-- フィールド番号セレクタ（指定フィールド印字モードのときだけ表示） -->
    <div class="field-selector" id="fieldSelector" style="display:none">
      <span class="field-selector-label">印字する項目（カンマ区切りの何番目）：</span>
      <div class="field-num-row" id="fieldNumRow">
        <!-- ボタンはJSで動的生成 -->
      </div>
    </div>

    <button class="scan-btn" id="scanBtn" onclick="openCamera()" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      QRをスキャン
    </button>

    <!-- 操作ボタン（上部に配置） -->
    <div class="action-row">
      <button class="footer-btn reset" id="resetBtn" onclick="clearAll()">↺ リセット</button>
      <button class="footer-btn print" id="printBtn" onclick="doPrint()">🖨 印刷</button>
    </div>

    <!-- 画面表示用のラベルプレビュー -->
    <div class="label-card" id="labelCardPreview">
      <div class="label-row">
        <div class="emphasis-block">
          <div class="field-1" id="field1Preview"></div>
          <div class="field-2" id="field2Preview"></div>
        </div>
        <div class="qr-block" id="qrBlockPreview"></div>
      </div>
    </div>

    <div class="raw-data-box" id="rawDataBox">
      <span class="raw-label">読み込みデータ（全項目）</span>
      <span id="rawDataText"></span>
    </div>

    <div class="status-bar" id="statusBar">QRをスキャンするとラベルが作成されます</div>

  </main>
</div>

<!-- 印刷専用ラベル（body直下に常設。画面では非表示、印刷時のみ表示） -->
<!-- printPage = 実際の用紙(縦55x65mm固定)。labelCardPrintはその中で90度回転させ横向き表示にする -->
<div id="printPage">
  <div class="label-card" id="labelCardPrint">
    <div class="label-row">
      <div class="emphasis-block">
        <div class="field-1" id="field1Print"></div>
        <div class="field-2" id="field2Print"></div>
      </div>
      <div class="qr-block" id="qrBlockPrint"></div>
    </div>
  </div>
</div>

<!-- Camera scan modal -->
<div class="cam-modal" id="camModal">
  <div class="cam-video-wrap">
    <video id="camVideo" playsinline muted autoplay></video>
    <div class="cam-topbar">
      <button class="cam-close" onclick="closeCamera()" aria-label="閉じる">✕</button>
    </div>
    <div class="cam-frame" id="camFrame"></div>
    <div class="cam-status" id="camStatus">QRコードを枠内に収めてください</div>
  </div>
  <div class="cam-error" id="camError" style="display:none">
    <div class="cam-error-icon">📷</div>
    <p id="camErrorMsg">カメラを起動できませんでした。<br>ブラウザの設定でカメラへのアクセスを許可してください。</p>
    <button class="cam-retry-btn" onclick="retryCamera()">再試行</button>
  </div>
</div>

<script>
  // ─── Elements ───
  const scanBtn      = document.getElementById('scanBtn');
  const field1Preview = document.getElementById('field1Preview');
  const field2Preview = document.getElementById('field2Preview');
  const qrBlockPreview = document.getElementById('qrBlockPreview');
  const labelCardPreview = document.getElementById('labelCardPreview');
  const field1Print   = document.getElementById('field1Print');
  const field2Print   = document.getElementById('field2Print');
  const qrBlockPrint  = document.getElementById('qrBlockPrint');
  const rawDataBox  = document.getElementById('rawDataBox');
  const rawDataText = document.getElementById('rawDataText');
  const statusBar   = document.getElementById('statusBar');
  const printBtn    = document.getElementById('printBtn');
  const statusDot   = document.getElementById('statusDot');
  const modeBtnDefault = document.getElementById('modeBtnDefault');
  const modeBtnField   = document.getElementById('modeBtnField');
  const fieldSelector  = document.getElementById('fieldSelector');
  const fieldNumRow    = document.getElementById('fieldNumRow');
  const camModal    = document.getElementById('camModal');
  const camVideo    = document.getElementById('camVideo');
  const camStatus   = document.getElementById('camStatus');
  const camError    = document.getElementById('camError');
  const camErrorMsg = document.getElementById('camErrorMsg');
  const camFrame    = document.getElementById('camFrame');

  let lastScannedData = '';

  // ─── モード管理 ───
  // 'default' : 1・2番目を強調表示し、QRには全データを格納（従来モード）
  // 'field'   : 選んだ番号のフィールドだけを文字表示し、QRもそのフィールド単体
  let currentMode = 'default';
  let selectedFieldIndex = 1; // 1始まり（1番目）。fieldモードで使用。

  function setMode(mode) {
    currentMode = mode;
    modeBtnDefault.classList.toggle('active', mode === 'default');
    modeBtnField.classList.toggle('active', mode === 'field');
    fieldSelector.style.display = (mode === 'field') ? 'block' : 'none';
    // モードを変えたら表示をクリアして混乱を防ぐ
    clearAll();
    statusBar.textContent = (mode === 'field')
      ? '印字する項目の番号を選び、QRをスキャンしてください'
      : 'QRをスキャンするとラベルが作成されます';
  }

  // フィールド番号ボタンを生成（スキャン前は1〜8の固定、スキャン後は実際の項目数に合わせて再生成）
  function buildFieldButtons(count) {
    fieldNumRow.innerHTML = '';
    for (let i = 1; i <= count; i++) {
      const btn = document.createElement('button');
      btn.className = 'field-num-btn' + (i === selectedFieldIndex ? ' active' : '');
      btn.type = 'button';
      btn.textContent = i + '番目';
      btn.onclick = () => selectField(i);
      fieldNumRow.appendChild(btn);
    }
  }

  function selectField(i) {
    selectedFieldIndex = i;
    // ボタンの見た目を更新
    Array.from(fieldNumRow.children).forEach((b, idx) => {
      b.classList.toggle('active', (idx + 1) === i);
    });
    // すでにスキャン済みなら、選び直しに合わせて再描画
    if (lastScannedData) parseAndRender(lastScannedData);
  }

  // コロンの直後で必ず改行する（:で区切って複数行表示にする）。
  function withBreakHints(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML.split(':').join(':<br>');
  }

  // ─── データ分割（カンマ区切り） ───
  // 例: "4/3-1,21622047:1411A:1513,1411A.2026-04-03 09:11:00,WJ-NX410KPV,15"
  //  → 標準モード: 強調1="4/3-1"(1番目), 強調2=2番目, QRに全データ
  //  → 指定フィールドモード: 選んだ番号の項目の文字＋その項目単体のQR
  function renderQR(el, text, size) {
    el.innerHTML = '';
    new QRCode(el, {
      text: text,
      width: size,
      height: size,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  function parseAndRender(raw) {
    const data = (raw || '').trim();
    if (!data) return;

    lastScannedData = data;
    const fields = data.split(',').map(f => f.trim());

    // フィールド番号ボタンを実際の項目数に合わせて作り直す（fieldモード時のみ表示される）
    if (currentMode === 'field') {
      if (selectedFieldIndex > fields.length) selectedFieldIndex = fields.length;
      buildFieldButtons(fields.length);
    }

    let textForLabel;   // 文字として印字する内容
    let textForQR;      // QRに格納する内容

    if (currentMode === 'field') {
      // 指定フィールド印字モード：選んだ番号（1始まり）の項目だけ
      const picked = fields[selectedFieldIndex - 1] || '';
      textForLabel = picked;
      textForQR = picked;          // QRも選んだ項目単体
    } else {
      // 標準モード：1番目を強調1、2番目を強調2、QRには全データ
      textForLabel = null;          // 下で個別にセット
      textForQR = data;
    }

    if (currentMode === 'field') {
      // 文字は1つだけ大きく表示（強調1の枠を使い、強調2は空に）
      field1Preview.textContent = textForLabel;
      field2Preview.innerHTML = '';
      field1Print.textContent = textForLabel;
      field2Print.innerHTML = '';
    } else {
      const f1 = fields[0] || '';
      const f2 = fields[1] || '';
      field1Preview.textContent = f1;
      field2Preview.innerHTML = withBreakHints(f2);
      field1Print.textContent = f1;
      field2Print.innerHTML = withBreakHints(f2);
    }

    // QR生成（画面用92px / 印刷用300px）
    renderQR(qrBlockPreview, textForQR, 92);
    renderQR(qrBlockPrint, textForQR, 300);

    labelCardPreview.classList.add('show');
    rawDataText.textContent = data;
    rawDataBox.classList.add('show');

    printBtn.classList.add('enabled');
    statusDot.classList.add('ready');
    statusBar.textContent = (currentMode === 'field')
      ? `${selectedFieldIndex}番目「${textForLabel}」を印字します。印刷ボタンを押してください`
      : 'ラベルを確認し、印刷ボタンを押してください';
  }

  function clearAll() {
    lastScannedData = '';
    field1Preview.textContent = '';
    field2Preview.innerHTML = '';
    qrBlockPreview.innerHTML = '';
    field1Print.textContent = '';
    field2Print.innerHTML = '';
    qrBlockPrint.innerHTML = '';
    labelCardPreview.classList.remove('show');
    rawDataBox.classList.remove('show');
    rawDataText.textContent = '';
    printBtn.classList.remove('enabled');
    statusDot.classList.remove('ready');
    statusBar.textContent = (currentMode === 'field')
      ? '印字する項目の番号を選び、QRをスキャンしてください'
      : 'QRをスキャンするとラベルが作成されます';
  }

  function doPrint() {
    if (!lastScannedData) return;
    window.print();
  }

  // ─── Camera scanning (QR読取り) ───
  let camStream = null;
  let camRafId = null;
  let camCanvas = null;
  let camCtx = null;
  let nativeDetector = null;
  let camStopScan = null;

  if ('BarcodeDetector' in window) {
    try {
      nativeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    } catch (e) { nativeDetector = null; }
  }

  async function openCamera() {
    camError.style.display = 'none';
    camFrame.style.display = '';
    camStatus.style.display = '';
    camModal.classList.add('open');

    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      camVideo.srcObject = camStream;
      await camVideo.play();
      startScanLoop();
    } catch (err) {
      showCamError(err);
    }
  }

  function showCamError(err) {
    camFrame.style.display = 'none';
    camStatus.style.display = 'none';
    camError.style.display = 'flex';
    if (err && (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')) {
      camErrorMsg.innerHTML = 'カメラへのアクセスが許可されていません。<br>ブラウザの設定でこのサイトのカメラ権限を許可してください。';
    } else if (err && err.name === 'NotFoundError') {
      camErrorMsg.innerHTML = 'カメラが見つかりませんでした。';
    } else {
      camErrorMsg.innerHTML = 'カメラを起動できませんでした。<br>ページを再読み込みして再度お試しください。';
    }
  }

  function retryCamera() { openCamera(); }

  function closeCamera() {
    camModal.classList.remove('open');
    if (camStopScan) { camStopScan(); camStopScan = null; }
    if (camRafId) { cancelAnimationFrame(camRafId); camRafId = null; }
    if (camStream) {
      camStream.getTracks().forEach(t => t.stop());
      camStream = null;
    }
    camVideo.srcObject = null;
  }

  function startScanLoop() {
    if (!camCanvas) {
      camCanvas = document.createElement('canvas');
      camCtx = camCanvas.getContext('2d', { willReadFrequently: true });
    }

    let busy = false;
    let stopped = false;
    camStopScan = () => { stopped = true; };

    const scanFrame = async () => {
      if (stopped) return;
      if (busy || !camStream || camVideo.readyState < 2) {
        camRafId = requestAnimationFrame(scanFrame);
        return;
      }
      busy = true;
      let value = null;

      if (nativeDetector) {
        try {
          const codes = await nativeDetector.detect(camVideo);
          if (codes && codes.length) value = codes[0].rawValue;
        } catch (e) {}
      } else if (window.jsQR) {
        const w = camVideo.videoWidth, h = camVideo.videoHeight;
        if (w && h) {
          camCanvas.width = w; camCanvas.height = h;
          camCtx.drawImage(camVideo, 0, 0, w, h);
          const imgData = camCtx.getImageData(0, 0, w, h);
          const result = jsQR(imgData.data, w, h);
          if (result && result.data) value = result.data;
        }
      }

      busy = false;
      if (stopped) return;

      if (value) {
        onCameraResult(value.trim());
        return;
      }
      camRafId = requestAnimationFrame(scanFrame);
    };

    camRafId = requestAnimationFrame(scanFrame);
  }

  function onCameraResult(value) {
    if (!value) { camRafId = requestAnimationFrame(() => startScanLoop()); return; }
    if (navigator.vibrate) navigator.vibrate(40);

    if (camStopScan) { camStopScan(); camStopScan = null; }
    if (camRafId) { cancelAnimationFrame(camRafId); camRafId = null; }

    parseAndRender(value);
    setTimeout(() => { closeCamera(); }, 600);
  }

  camModal.addEventListener('click', e => {
    if (e.target === camModal) closeCamera();
  });

  // ─── ネイティブ連携用ブリッジ（将来WebViewラッパーから利用する場合） ───
  window.onNativeScan = function(value) {
    if (!value) return;
    parseAndRender(String(value).trim());
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // 起動時：フィールド番号ボタンを初期表示（スキャン前は1〜8を仮表示。スキャン後に実際の項目数へ更新）
  buildFieldButtons(8);
</script>
</body>
</html>
